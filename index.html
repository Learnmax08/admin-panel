<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Direct Fast Approve</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #DFB8F2;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #B43EF0;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .badge-pending {
            background-color: #ffc107;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-approved {
            background-color: #28a745;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-approve {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-approve:hover {
            background-color: #218838;
        }
        .count-badge {
            background-color: #6c757d;
            color: white;
            padding: 3px 8px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
        }
        .status-msg {
            font-style: italic;
            color: #555;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>වෙබ් අඩවියෙන්ම Log in තොරතුරු</h2>
        <p style="color: #666;">(Real-time)  Admin.</p>
        
        <table>
            <thead>
                <tr>
                    <th>ශිෂ්‍යයාගේ නම (Username)</th>
                    <th>ඊමේල් ලිපිනය</th>
                    <th>අවසන් වරට Login වූ වේලාව</th>
                    <th>Login වාර ගණන</th>
                    <th>තත්ත්වය (Status)</th>
                    <th>ක්‍රියාමාර්ග</th>
                </tr>
            </thead>
            <tbody id="students-container">
                <tr>
                    <td colspan="6" class="status-msg" id="loading-row">Loading students... (දත්ත පද්ධතියට සම්බන්ධ වෙමින් පවතී)</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ඔයා ලබාදුන් Firebase Config විස්තර
        const firebaseConfig = {
            apiKey: "AIzaSyCmciwmEbSDgA5PhCY12a_vKqXl4GDBeZ8",
            authDomain: "school-project-5fe93.firebaseapp.com",
            projectId: "school-project-5fe93",
            storageBucket: "school-project-5fe93.firebasestorage.app",
            messagingSenderId: "548925209782",
            appId: "1:548925209782:web:cea0aac7d41a510b2fba17",
            measurementId: "G-5MG8T54708"
        };

        // Firebase Initialize කිරීම
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Real-time ශිෂ්‍යයන් ලැයිස්තුව ලබාගැනීම
        function listenForNewStudents() {
            const studentsContainer = document.getElementById("students-container");
            if (!studentsContainer) return;

            const collectionRef = collection(db, "users"); 
            
            // 💡 හැමෝමවම (Pending සහ Approved ඔක්කොම) එකම තැනකින් බලාගන්න query එක සකස් කළා
            const q = query(collectionRef);

            onSnapshot(q, (querySnapshot) => {
                studentsContainer.innerHTML = ""; // පරණ දත්ත සහ Loading මැසේජ් එක අයින් කරනවා

                if (querySnapshot.empty) {
                    studentsContainer.innerHTML = "<tr><td colspan='6' style='text-align:center; color:#888; font-weight:bold; padding:20px;'>ශිෂ්‍යයන් කිසිවෙකු නැත!</td></tr>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const student = doc.data();
                    const studentId = doc.id; 

                    // Firebase Server Timestamp එක කියවිය හැකි ශ්‍රී ලංකා වේලාවකට හැරවීම
                    let formattedTime = "තවමත් Login වී නැත";
                    if (student.lastLogin) {
                        const date = student.lastLogin.toDate();
                        formattedTime = date.toLocaleString('si-LK'); 
                    }

                    // වාර ගණන (නැත්නම් 0 පෙන්වයි)
                    const loginCount = student.loginCount || 0;

                    // තත්ත්වය අනුව Badge එක වෙනස් කිරීම
                    const isApproved = student.status === "approved";
                    const statusBadge = isApproved 
                        ? `<span class="badge-approved">Approved</span>` 
                        : `<span class="badge-pending">Pending</span>`;

                    // ක්‍රියාමාර්ග බටන් එක (Approve නම් බටන් එක නැත, Pending නම් විතරක් බටන් එක පෙනේ)
                    const actionButton = isApproved
                        ? `<span style="color: #28a745; font-weight: bold;">✓ සාර්ථකයි</span>`
                        : `<button class="btn-approve" onclick="approveStudent('${studentId}')">✓ Approve Fast</button>`;

                    studentsContainer.innerHTML += `
                        <tr>
                            <td>${student.username || 'නමක් නැත'}</td>
                            <td>${student.email || 'Email නැත'}</td>
                            <td style="color: #555; font-weight: 500;">${formattedTime}</td>
                            <td><span class="count-badge">${loginCount}</span></td>
                            <td>${statusBadge}</td>
                            <td>${actionButton}</td>
                        </tr>
                    `;
                });
            }, (error) => {
                console.error("Firebase Error: ", error);
                studentsContainer.innerHTML = `<tr><td colspan='6' style='color:red; text-align:center; font-weight:bold; padding:20px;'>Error: ${error.message}<br>කරුණාකර Firebase Rules "true" කර ඇතිදැයි පරීක්ෂා කරන්න.</td></tr>`;
            });
        }

        // වෙබ් එකේ බටන් එක එබූ විට Firebase එකේ Status එක Approved කරන ශ්‍රිතය
        window.approveStudent = async function(studentId) {
            try {
                const userRef = doc(db, "users", studentId);
                
                await updateDoc(userRef, {
                    status: "approved"
                });
                
                alert("ශිෂ්‍යයා සාර්ථකව අනුමත කරන ලදී!");
                
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        // පිටුව පූරණය වූ සැනින් ශිෂ්‍යයන් සෙවීම අරඹන්න
        listenForNewStudents();

    </script>
</body>
</html>
